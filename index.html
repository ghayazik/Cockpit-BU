function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [vision, setVision] = useState(null);
  const [data, setData] = useState(null);
  const [files, setFiles] = useState([]);
  const [showAI, setShowAI] = useState(false);
  const [showPwModal, setShowPwModal] = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);
  const [showDataEntry, setShowDataEntry] = useState(false);
  const [userMenuOpen, setUserMenuOpen] = useState(false);
  const [dbReady, setDbReady] = useState(false);
  const [showGuide, setShowGuide] = useState(false);
  const [importStatus, setImportStatus] = useState(null);
  const [demoMode, setDemoMode] = useState(true);
  const [rawSheets, setRawSheets] = useState({}); // all imported sheets raw
  const [sheetAssign, setSheetAssign] = useState({}); // manual sheet -> vision mapping
  const [colConfig, setColConfig] = useState({}); // { sheetName: { origCol: { rename, type, desc } } }
  const [expandedSheet, setExpandedSheet] = useState(null); // which sheet has column editor open
  const [showImportPanel, setShowImportPanel] = useState(false);
  const fileInputRef = useRef();

  // Auto-detect column types
  const detectColType = (rows, col) => {
    const vals = rows.map(r => r[col]).filter(v => v !== "" && v !== null && v !== undefined);
    if (vals.length === 0) return "texte";
    const nums = vals.filter(v => typeof v === "number" || (!isNaN(parseFloat(v)) && isFinite(v)));
    if (nums.length > vals.length * 0.6) return "nombre";
    // Check if dates
    const datePatterns = vals.filter(v => /\d{2,4}[-/.]\d{1,2}[-/.]\d{1,4}|jan|fev|mar|avr|mai|jun|jul|aou|sep|oct|nov|dec/i.test(String(v)));
    if (datePatterns.length > vals.length * 0.5) return "date";
    const unique = new Set(vals.map(v => String(v).toLowerCase()));
    if (unique.size <= 5 && vals.length > 5) return "catégorie";
    return "texte";
  };

  // Initialize column config for a sheet
  const initColConfig = (sheetName, rows) => {
    if (colConfig[sheetName]) return colConfig[sheetName];
    const cols = rows.length > 0 ? Object.keys(rows[0]) : [];
    const cfg = {};
    cols.forEach(c => {
      cfg[c] = { rename: c, type: detectColType(rows, c), desc: "" };
    });
    return cfg;
  };

  // Update a single column config
  const updateColConfig = (sheetName, origCol, field, value) => {
    setColConfig(prev => ({
      ...prev,
      [sheetName]: { ...(prev[sheetName] || {}), [origCol]: { ...(prev[sheetName]?.[origCol] || {}), [field]: value } }
    }));
  };

  // Apply column renames to sheet data
  const applyColRenames = (sheetName, rows) => {
    const cfg = colConfig[sheetName];
    if (!cfg) return rows;
    return rows.map(row => {
      const newRow = {};
      Object.entries(row).forEach(([k, v]) => {
        const renamed = cfg[k]?.rename || k;
        newRow[renamed] = v;
      });
      return newRow;
    });
  };

  // Build dashboard data from raw sheets + assignments
  const buildDataFromSheets = useCallback((sheets, assignments) => {
    // Apply column renames
    const renamedSheets = {};
    Object.entries(sheets).forEach(([sn, rows]) => {
      renamedSheets[sn] = applyColRenames(sn, rows);
    });

    const result = { financier_n: null, financier_n1: null, operationnel_n: null, operationnel_n1: null, rh: null, gouvernance: null, autre: {} };
    const assignedSheets = new Set();
    
    // First: auto-categorize (using renamed columns)
    const cat = categorize(renamedSheets);
    const autoAssigned = new Set();
    Object.entries(cat).forEach(([catName, rows]) => {
      Object.entries(renamedSheets).forEach(([sn, sr]) => {
        if (sr === rows || (sr.length > 0 && rows.length > 0 && sr[0] === rows[0])) autoAssigned.add(sn);
      });
    });
    if (cat.financier) { result.financier_n = cat.financier; }
    if (cat.operationnel) { result.operationnel_n = cat.operationnel; }
    if (cat.rh) { result.rh = cat.rh; }
    if (cat.gouvernance) { result.gouvernance = cat.gouvernance; }
    
    // Second: apply manual assignments (override auto)
    Object.entries(assignments).forEach(([sheetName, vision]) => {
      if (vision && vision !== "auto" && vision !== "" && renamedSheets[sheetName]) {
        assignedSheets.add(sheetName);
        if (vision === "autre") {
          result.autre[sheetName] = renamedSheets[sheetName];
        } else {
          const key = vision === "rh" ? "rh" : vision === "gouvernance" ? "gouvernance" : vision + "_n";
          result[key] = renamedSheets[sheetName];
        }
      } else if (vision === "auto") {
        assignedSheets.add(sheetName);
      }
    });
    
    // Collect uncategorized sheets into "autre"
    Object.entries(renamedSheets).forEach(([sn, rows]) => {
      if (!assignedSheets.has(sn) && !autoAssigned.has(sn) && rows.length > 0) {
        result.autre[sn] = rows;
      }
    });
    
    // Fill with demo if demoMode active
    if (demoMode) {
      const demo = generateDemoData();
      if (!result.financier_n) result.financier_n = demo.financier_n;
      if (!result.financier_n1) result.financier_n1 = demo.financier_n1;
      if (!result.operationnel_n) result.operationnel_n = demo.operationnel_n;
      if (!result.operationnel_n1) result.operationnel_n1 = demo.operationnel_n1;
      if (!result.rh) result.rh = demo.rh;
      if (!result.gouvernance) result.gouvernance = demo.gouvernance;
    }
    
    return result;
  }, [demoMode]);

  const handleFileImport = useCallback(async (e) => {
    const fileList = Array.from(e.target.files || []);
    if (!fileList.length) return;
    setImportStatus("loading");
    try {
      const { sheets, fileInfos } = await parseAllFiles(fileList);
      const merged = { ...rawSheets, ...sheets };
      setRawSheets(merged);
      setData(buildDataFromSheets(merged, sheetAssign));
      setFiles(prev => [...prev, ...fileInfos]);
      setImportStatus("done");
      // Show import panel if sheets found
      if (Object.keys(sheets).length > 0) {
        setShowImportPanel(true);
      }
      setTimeout(() => setImportStatus(null), 2000);
    } catch (err) {
      console.error("Import error:", err);
      setImportStatus("error");
      setTimeout(() => setImportStatus(null), 3000);
    }
    if (e.target) e.target.value = "";
  }, [demoMode, rawSheets, sheetAssign, buildDataFromSheets]);

  const handleSheetAssign = (sheetName, vision) => {
    const newAssign = { ...sheetAssign, [sheetName]: vision };
    setSheetAssign(newAssign);
    setData(buildDataFromSheets(rawSheets, newAssign));
  };

  const deleteImportedSheet = (sheetName) => {
    const newSheets = { ...rawSheets };
    delete newSheets[sheetName];
    const newAssign = { ...sheetAssign };
    delete newAssign[sheetName];
    setRawSheets(newSheets);
    setSheetAssign(newAssign);
    setData(buildDataFromSheets(newSheets, newAssign));
    if (Object.keys(newSheets).length === 0) {
      setFiles([]);
      if (!demoMode) setData(null);
    }
  };

  const deleteAllImported = () => {
    setRawSheets({});
    setSheetAssign({});
    setFiles([]);
    setShowImportPanel(false);
    if (demoMode) {
      setData(generateDemoData());
    } else {
      setData(null);
    }
  };

  const toggleDemoMode = () => {
    const next = !demoMode;
    setDemoMode(next);
    if (next && Object.keys(rawSheets).length === 0) {
      setData(generateDemoData());
      setFiles([{name: "demo_bu_it.xlsx", sheets: 6}]);
    }
  };

  // Rebuild data when demoMode changes and sheets exist
  useEffect(() => {
    if (Object.keys(rawSheets).length > 0) {
      setData(buildDataFromSheets(rawSheets, sheetAssign));
    }
  }, [demoMode]);

  // ── Initialize database + preload SheetJS on app startup ──
  useEffect(() => {
    (async () => {
      await loadFirebase();
      await initDefaultUsers();
      setDbReady(true);
    })();
  }, []);

  // Set default vision based on user rights
  useEffect(() => {
    if (currentUser && !vision) {
      setVision(currentUser.visions[0] || "financier");
    }
  }, [currentUser]);

  const [allowedVisions, setAllowedVisions] = useState([]);

  useEffect(() => {
    if (!currentUser) { setAllowedVisions([]); return; }
    getUsers().then(users => {
      const fresh = users.find(u => u.id === currentUser.id);
      setAllowedVisions(fresh ? fresh.visions : currentUser.visions);
    });
  }, [currentUser, showAdmin]);

  const loadDemo = () => {
    if (!demoMode) return;
    setData(generateDemoData());
    setFiles([{name:"demo_bu_it.xlsx",sheets:6}]);
  };

  const handlePasswordChange = async (newPw) => {
    const updatedUser = { ...currentUser, password: newPw };
    await saveUser(updatedUser);
    setCurrentUser(updatedUser);
  };

  const handleLogout = () => { setCurrentUser(null); setData(null); setFiles([]); setVision(null); setShowAI(false); setUserMenuOpen(false); setDemoMode(true); };

  const currentData = useMemo(() => {
    if (!data) return null;
    if (vision === "financier") return data.financier_n;
    if (vision === "operationnel") return data.operationnel_n;
    if (vision === "autre") {
      // Flatten all autre sheets into one array for AI analysis
      const all = [];
      Object.values(data.autre || {}).forEach(rows => all.push(...rows));
      return all.length > 0 ? all : null;
    }
    return data[vision];
  }, [data, vision]);

  const allTabs = [
    { id: "financier", label: "Financière", icon: "💰" },
    { id: "operationnel", label: "Opérationnelle", icon: "⚙️" },
    { id: "rh", label: "RH", icon: "👥" },
    { id: "gouvernance", label: "Gouvernance", icon: "🏛" },
  ];
  const hasAutre = data && data.autre && Object.keys(data.autre).length > 0;
  const tabs = [...allTabs.filter(t => allowedVisions.includes(t.id)), ...(hasAutre ? [{ id: "autre", label: "Autre", icon: "📁" }] : [])];

  // ── LOGIN ──
  if (!currentUser) return <LoginPage onLogin={setCurrentUser} dbReady={dbReady} />;

  const isAdmin = currentUser.role === "admin";
  const roleLabels = { admin: "Administrateur", directeur: "Directeur", manager: "Manager", viewer: "Lecteur" };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: font, color: C.text }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

      {/* ── HEADER ── */}
      <header style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: "12px 28px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 40, height: 40, borderRadius: 10, background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 900, color: C.bg }}>BU</div>
          <div>
            <h1 style={{ margin: 0, fontSize: 17, fontWeight: 900, letterSpacing: -0.5 }}>Cockpit <span style={{ color: C.primary2 }}>Directeur BU</span></h1>
            <p style={{ margin: 0, color: C.text3, fontSize: 10 }}>IT / Digital / Transformation</p>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 10px", borderRadius: 6, background: C.bg, border: `1px solid ${C.border}` }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: getDBMode() === "firebase" ? C.accent : C.primary, boxShadow: `0 0 6px ${getDBMode() === "firebase" ? C.accent : C.primary}50` }} />
            <span style={{ color: C.text3, fontSize: 9, fontWeight: 600 }}>{getDBMode() === "firebase" ? "Firebase" : "localStorage"}</span>
          </div>
          {files.length > 0 && <Badge color={C.accent}>● {files.length} fichier(s)</Badge>}
          {Object.keys(rawSheets).length > 0 && (
            <Btn variant="secondary" onClick={() => setShowImportPanel(true)} small>
              📁 Fichiers ({Object.keys(rawSheets).length})
            </Btn>
          )}
          {importStatus === "loading" && <Badge color={C.warn}>⏳ Import...</Badge>}
          {importStatus === "done" && <Badge color={C.accent}>✅ Importé</Badge>}
          {importStatus === "error" && <Badge color={C.danger}>❌ Erreur</Badge>}
          <Btn onClick={() => fileInputRef.current?.click()} small>📂 Importer</Btn>
          <input ref={fileInputRef} type="file" accept=".xlsx,.xls,.csv,.tsv" multiple onChange={handleFileImport} style={{ display: "none" }} />
          {demoMode && <Btn variant="secondary" onClick={loadDemo} small>Démo</Btn>}
          {/* Demo toggle */}
          <button onClick={toggleDemoMode} title={demoMode ? "Désactiver données démo" : "Activer données démo"} style={{
            display: "flex", alignItems: "center", gap: 5, padding: "5px 12px", borderRadius: 8, cursor: "pointer",
            background: demoMode ? C.accentDim : C.bg, border: `1px solid ${demoMode ? C.accent + "40" : C.border}`,
            transition: "all 0.2s", fontSize: 11, fontWeight: 600, fontFamily: font,
            color: demoMode ? C.accent : C.text3,
          }}>
            <span style={{ width: 28, height: 16, borderRadius: 8, background: demoMode ? C.accent : C.text3 + "40", position: "relative", display: "inline-block", transition: "background 0.2s" }}>
              <span style={{ width: 12, height: 12, borderRadius: "50%", background: C.white, position: "absolute", top: 2, left: demoMode ? 14 : 2, transition: "left 0.2s" }} />
            </span>
            Démo
          </button>
          {data && <>
            <Btn variant="success" onClick={() => exportExcel(data)} small>📥 Excel</Btn>
            <Btn variant={showAI ? "danger" : "secondary"} onClick={() => setShowAI(!showAI)} small>🤖 {showAI ? "Fermer" : "IA"}</Btn>
          </>}
          <Btn variant="secondary" onClick={() => setShowDataEntry(true)} small>📝 Saisie</Btn>
          <Btn variant="secondary" onClick={() => setShowGuide(true)} small>📖 Guide</Btn>
          {isAdmin && <Btn variant="secondary" onClick={() => setShowAdmin(true)} small>⚙️ Admin</Btn>}

          {/* User menu */}
          <div style={{ position: "relative" }}>
            <button onClick={() => setUserMenuOpen(!userMenuOpen)} style={{
              display: "flex", alignItems: "center", gap: 8, background: C.card, border: `1px solid ${C.border}`,
              borderRadius: 10, padding: "7px 14px", cursor: "pointer", transition: "border-color 0.2s",
            }} onMouseEnter={e => e.currentTarget.style.borderColor = C.primary} onMouseLeave={e => { if(!userMenuOpen) e.currentTarget.style.borderColor = C.border; }}>
              <div style={{ width: 28, height: 28, borderRadius: 8, background: `linear-gradient(135deg, ${C.primary}40, ${C.accent}40)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, color: C.primary2 }}>{currentUser.nom.charAt(0)}</div>
              <div style={{ textAlign: "left" }}>
                <div style={{ color: C.text, fontSize: 11, fontWeight: 700, lineHeight: 1.2 }}>{currentUser.nom}</div>
                <div style={{ color: C.text3, fontSize: 9 }}>{roleLabels[currentUser.role]}</div>
              </div>
              <span style={{ color: C.text3, fontSize: 10, transform: userMenuOpen ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</span>
            </button>
            {userMenuOpen && (
              <>
                <div style={{ position: "fixed", inset: 0, zIndex: 999 }} onClick={() => setUserMenuOpen(false)} />
                <div style={{ position: "absolute", top: "calc(100% + 6px)", right: 0, background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 6, minWidth: 200, zIndex: 1000, boxShadow: "0 12px 40px rgba(0,0,0,0.5)" }}>
                  <div style={{ padding: "10px 14px", borderBottom: `1px solid ${C.border}` }}>
                    <div style={{ color: C.text, fontSize: 13, fontWeight: 700 }}>{currentUser.nom}</div>
                    <div style={{ color: C.text3, fontSize: 10, marginTop: 2 }}>{currentUser.email || currentUser.id}</div>
                    <div style={{ marginTop: 6, display: "flex", gap: 4, flexWrap: "wrap" }}>
                      {allowedVisions.map(v => <Badge key={v} color={C.primary}>{VISION_LABELS[v]}</Badge>)}
                    </div>
                  </div>
                  <button onClick={() => { setShowPwModal(true); setUserMenuOpen(false); }} style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "10px 14px", background: "none", border: "none", color: C.text2, fontSize: 12, cursor: "pointer", textAlign: "left", borderRadius: 6 }}
                    onMouseEnter={e => e.currentTarget.style.background = C.bg} onMouseLeave={e => e.currentTarget.style.background = "none"}>
                    🔑 Changer mot de passe
                  </button>
                  {isAdmin && <button onClick={() => { setShowAdmin(true); setUserMenuOpen(false); }} style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "10px 14px", background: "none", border: "none", color: C.text2, fontSize: 12, cursor: "pointer", textAlign: "left", borderRadius: 6 }}
                    onMouseEnter={e => e.currentTarget.style.background = C.bg} onMouseLeave={e => e.currentTarget.style.background = "none"}>
                    ⚙️ Administration
                  </button>}
                  <div style={{ borderTop: `1px solid ${C.border}`, marginTop: 2 }}>
                    <button onClick={handleLogout} style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "10px 14px", background: "none", border: "none", color: C.danger, fontSize: 12, cursor: "pointer", textAlign: "left", borderRadius: 6 }}
                      onMouseEnter={e => e.currentTarget.style.background = C.dangerDim} onMouseLeave={e => e.currentTarget.style.background = "none"}>
                      🚪 Déconnexion
                    </button>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      </header>

      {/* ── WELCOME ── */}
      {!data && (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "75vh", gap: 28, padding: 40 }}>
          <div style={{ width: 80, height: 80, borderRadius: 20, background: `linear-gradient(135deg, ${C.primary}20, ${C.accent}20)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 40 }}>📊</div>
          <h2 style={{ fontSize: 28, fontWeight: 900, margin: 0, textAlign: "center" }}>Bienvenue, <span style={{ color: C.primary2 }}>{currentUser.nom}</span></h2>
          <p style={{ color: C.text2, fontSize: 13, textAlign: "center", maxWidth: 560, lineHeight: 1.8 }}>
            Vous avez accès à {allowedVisions.length} vision(s) : {allowedVisions.map(v => VISION_LABELS[v]).join(", ")}. Importez vos rapports pour commencer.
          </p>
          <div style={{ display: "grid", gridTemplateColumns: `repeat(${Math.min(tabs.length, 4)}, 1fr)`, gap: 14 }}>
            {tabs.map(t => (
              <div key={t.id} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "22px 18px", textAlign: "center", width: 150 }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>{t.icon}</div>
                <div style={{ color: C.text, fontSize: 13, fontWeight: 700 }}>{t.label}</div>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 8, width: "100%", maxWidth: 500 }}>
            <Btn onClick={() => fileInputRef.current?.click()} style={{ width: "100%", padding: "16px", borderRadius: 12, fontSize: 15 }}>📂 Importer mes fichiers Excel / CSV</Btn>
            <Btn variant="secondary" onClick={() => setShowGuide(true)} style={{ width: "100%", padding: "12px", borderRadius: 10 }}>📖 Guide : format des données recommandé</Btn>
            {demoMode ? (
              <Btn variant="secondary" onClick={loadDemo} style={{ width: "100%", padding: "14px", borderRadius: 10 }}>Tester avec données démo</Btn>
            ) : (
              <div style={{ textAlign: "center", padding: "10px 0", color: C.text3, fontSize: 12 }}>
                Mode démo désactivé — seules les données importées seront utilisées
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── DASHBOARD ── */}
      {data && (
        <div style={{ padding: "18px 28px", marginRight: showAI ? 520 : 0, transition: "margin 0.3s" }}>
          {tabs.length === 0 ? (
            <div style={{ textAlign: "center", padding: 60, color: C.text3 }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>🔒</div>
              <p style={{ fontSize: 16, fontWeight: 700, color: C.text2 }}>Aucun dashboard autorisé</p>
              <p style={{ fontSize: 13 }}>Contactez l'administrateur pour obtenir des droits d'accès.</p>
            </div>
          ) : <>
            <div style={{ display: "flex", gap: 8, marginBottom: 20, alignItems: "center", flexWrap: "wrap" }}>
              {tabs.map(t => (
                <button key={t.id} onClick={() => setVision(t.id)} style={{
                  background: vision===t.id ? `linear-gradient(135deg, ${C.primary}, ${C.accent})` : "transparent",
                  color: vision===t.id ? C.bg : C.text2,
                  border: vision===t.id ? "none" : `1px solid ${C.border}`,
                  borderRadius: 8, padding: "9px 20px", cursor: "pointer",
                  fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", gap: 6, transition: "all 0.2s",
                }}><span style={{ fontSize: 15 }}>{t.icon}</span> {t.label}</button>
              ))}
              {Object.keys(rawSheets).length > 0 && (
                <button onClick={() => setShowImportPanel(true)} style={{
                  marginLeft: "auto", background: C.bg, border: `1px solid ${C.border}`,
                  borderRadius: 8, padding: "8px 16px", cursor: "pointer",
                  fontSize: 11, fontWeight: 600, color: C.text2, display: "flex", alignItems: "center", gap: 6,
                  fontFamily: font, transition: "all 0.2s",
                }} onMouseEnter={e => e.currentTarget.style.borderColor = C.primary} onMouseLeave={e => e.currentTarget.style.borderColor = C.border}>
                  📁 Gérer fichiers <span style={{ background: C.primaryDim, color: C.primary2, padding: "2px 7px", borderRadius: 5, fontSize: 10, fontWeight: 800 }}>{Object.keys(rawSheets).length}</span>
                </button>
              )}
            </div>
            {vision === "financier" && allowedVisions.includes("financier") && <FinancierView dataN={data.financier_n} dataN1={data.financier_n1} />}
            {vision === "operationnel" && allowedVisions.includes("operationnel") && <OperationnelView dataN={data.operationnel_n} dataN1={data.operationnel_n1} />}
            {vision === "rh" && allowedVisions.includes("rh") && <RHView data={data.rh} />}
            {vision === "gouvernance" && allowedVisions.includes("gouvernance") && <GouvernanceView data={data.gouvernance} />}
            {vision === "autre" && hasAutre && <AutreView data={currentData} sheetsMap={data.autre} />}
            {vision !== "autre" && !allowedVisions.includes(vision) && <div style={{textAlign:"center",padding:40,color:C.warn}}>🔒 Accès non autorisé à cette vision</div>}
          </>}
        </div>
      )}

      {/* ── PANELS & MODALS ── */}
      {showAI && data && <AIPanel data={currentData} vision={allTabs.find(t=>t.id===vision)?.label} onClose={()=>setShowAI(false)} />}
      {showPwModal && <PasswordModal user={currentUser} onClose={() => setShowPwModal(false)} onSave={handlePasswordChange} />}
      {showAdmin && <AdminPanel currentUser={currentUser} onClose={() => setShowAdmin(false)} onUsersChange={(u) => { const me = u.find(x=>x.id===currentUser.id); if(me) setCurrentUser(me); }} />}
      {showDataEntry && <DataEntryPanel currentUser={currentUser} onClose={() => setShowDataEntry(false)} />}
      {showGuide && <GuideModal onClose={() => setShowGuide(false)} />}

      {/* ── IMPORT PANEL ── */}
      {showImportPanel && Object.keys(rawSheets).length > 0 && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2000 }} onClick={() => setShowImportPanel(false)}>
          <div onClick={e => e.stopPropagation()} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 20, width: 720, maxHeight: "85vh", display: "flex", flexDirection: "column", overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.6)" }}>
            <div style={{ padding: "20px 28px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
              <div>
                <h2 style={{ color: C.text, fontSize: 17, fontWeight: 900, margin: 0 }}>📂 Gestion des fichiers importés</h2>
                <p style={{ color: C.text3, fontSize: 11, margin: "4px 0 0" }}>Visualiser, catégoriser ou supprimer vos données</p>
              </div>
              <button onClick={() => setShowImportPanel(false)} style={{ background: "none", border: "none", color: C.text3, fontSize: 22, cursor: "pointer" }}>✕</button>
            </div>

            {/* Summary badges */}
            <div style={{ padding: "14px 28px", borderBottom: `1px solid ${C.border}`, display: "flex", gap: 10, flexWrap: "wrap", flexShrink: 0 }}>
              <Badge color={C.primary}>{Object.keys(rawSheets).length} feuille(s)</Badge>
              <Badge color={C.accent}>{Object.values(rawSheets).reduce((s, r) => s + r.length, 0)} lignes total</Badge>
              {(() => {
                const assigned = Object.values(sheetAssign).filter(v => v && v !== "" && v !== "auto").length;
                const auto = Object.values(sheetAssign).filter(v => v === "auto").length + Object.keys(rawSheets).filter(n => !sheetAssign[n] && categorize({ [n]: rawSheets[n] }) && Object.keys(categorize({ [n]: rawSheets[n] })).length > 0).length;
                const unassigned = Object.keys(rawSheets).length - assigned - auto;
                return <>
                  {assigned > 0 && <Badge color={C.accent}>{assigned} assigné(s)</Badge>}
                  {auto > 0 && <Badge color={C.primary}>{auto} auto-détecté(s)</Badge>}
                  {unassigned > 0 && <Badge color={C.warn}>{unassigned} non classé(s)</Badge>}
                </>;
              })()}
            </div>

            <div style={{ padding: "16px 28px", flex: 1, overflowY: "auto" }}>
              {Object.entries(rawSheets).map(([name, rows]) => {
                const cols = rows.length > 0 ? Object.keys(rows[0]) : [];
                const autoVision = (() => {
                  const txt = (name + " " + cols.join(" ")).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                  const kw = { financier: ["ca", "chiffre", "revenue", "budget", "marge", "charge", "tresorerie", "invest", "cout", "montant", "ebitda", "backlog", "dso"], operationnel: ["projet", "livraison", "sla", "incident", "satisfaction", "client", "taux", "occupation", "tjm", "ticket", "dette"], rh: ["effectif", "employe", "turnover", "formation", "absenteisme", "salaire", "departement", "certification"], gouvernance: ["conformite", "risque", "audit", "rgpd", "securite", "gouvernance", "action", "score", "rse", "pca"] };
                  let best = null, bs = 0;
                  Object.entries(kw).forEach(([cat, words]) => { const sc = words.filter(w => txt.includes(w)).length; if (sc > bs) { best = cat; bs = sc; } });
                  return best;
                })();
                const assigned = sheetAssign[name] || (autoVision ? "auto" : "");
                const sheetCfg = colConfig[name] || initColConfig(name, rows);
                const isExpanded = expandedSheet === name;

                return (
                  <div key={name} style={{ background: C.card, border: `1px solid ${isExpanded ? C.primary + "40" : C.border}`, borderRadius: 14, padding: "16px 20px", marginBottom: 12, transition: "border-color 0.2s" }}>
                    {/* Header row */}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <div>
                        <div style={{ color: C.text, fontSize: 14, fontWeight: 700 }}>{name}</div>
                        <div style={{ color: C.text3, fontSize: 11, marginTop: 2 }}>{rows.length} lignes · {cols.length} colonnes</div>
                      </div>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <button onClick={() => setExpandedSheet(isExpanded ? null : name)} style={{
                          background: isExpanded ? C.primaryDim : C.bg, border: `1px solid ${isExpanded ? C.primary + "40" : C.border}`,
                          borderRadius: 8, padding: "7px 12px", color: isExpanded ? C.primary2 : C.text3, fontSize: 11, fontWeight: 600,
                          cursor: "pointer", fontFamily: font, display: "flex", alignItems: "center", gap: 4,
                        }}>✏️ Colonnes</button>
                        <select value={assigned} onChange={e => handleSheetAssign(name, e.target.value)}
                          style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", color: C.text, fontSize: 12, outline: "none", fontFamily: font, minWidth: 180 }}>
                          <option value="">— Non assigné —</option>
                          <option value="auto">🔄 Auto-détecté{autoVision ? ` (${VISION_LABELS[autoVision]})` : ""}</option>
                          <option value="financier">💰 Financière</option>
                          <option value="operationnel">⚙️ Opérationnelle</option>
                          <option value="rh">👥 RH</option>
                          <option value="gouvernance">🏛 Gouvernance</option>
                          <option value="autre">📁 Autre</option>
                        </select>
                        <Btn variant="danger" small onClick={() => deleteImportedSheet(name)}>🗑</Btn>
                      </div>
                    </div>

                    {/* Column editor — expanded */}
                    {isExpanded && (
                      <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10, padding: 14, marginBottom: 12 }}>
                        <div style={{ color: C.primary2, fontSize: 11, fontWeight: 700, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
                          ✏️ Configuration des colonnes
                          <span style={{ color: C.text3, fontWeight: 400 }}>— Renommez pour améliorer la détection automatique</span>
                        </div>
                        <div style={{ overflowX: "auto" }}>
                          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 600 }}>
                            <thead>
                              <tr>
                                <th style={{ padding: "6px 8px", textAlign: "left", color: C.text3, fontSize: 9, fontWeight: 700, borderBottom: `1px solid ${C.border}`, width: 140 }}>COLONNE ORIGINALE</th>
                                <th style={{ padding: "6px 8px", textAlign: "left", color: C.primary2, fontSize: 9, fontWeight: 700, borderBottom: `1px solid ${C.border}`, width: 160 }}>RENOMMER EN</th>
                                <th style={{ padding: "6px 8px", textAlign: "left", color: C.accent, fontSize: 9, fontWeight: 700, borderBottom: `1px solid ${C.border}`, width: 100 }}>TYPE</th>
                                <th style={{ padding: "6px 8px", textAlign: "left", color: C.text3, fontSize: 9, fontWeight: 700, borderBottom: `1px solid ${C.border}` }}>DESCRIPTION</th>
                                <th style={{ padding: "6px 8px", textAlign: "left", color: C.text3, fontSize: 9, fontWeight: 700, borderBottom: `1px solid ${C.border}`, width: 100 }}>APERÇU</th>
                              </tr>
                            </thead>
                            <tbody>
                              {cols.map(c => {
                                const cfg = sheetCfg[c] || { rename: c, type: detectColType(rows, c), desc: "" };
                                const sample = rows.slice(0, 2).map(r => String(r[c] ?? "")).join(", ");
                                return (
                                  <tr key={c}>
                                    <td style={{ padding: "5px 8px", color: C.text3, fontSize: 11, fontFamily: mono, borderBottom: `1px solid ${C.border}15` }}>{c}</td>
                                    <td style={{ padding: "4px 6px", borderBottom: `1px solid ${C.border}15` }}>
                                      <input value={cfg.rename} onChange={e => updateColConfig(name, c, "rename", e.target.value)}
                                        style={{ width: "100%", background: C.card, border: `1px solid ${C.border}`, borderRadius: 6, padding: "5px 8px", color: C.text, fontSize: 11, fontFamily: mono, outline: "none" }}
                                        onFocus={e => e.target.style.borderColor = C.primary} onBlur={e => e.target.style.borderColor = C.border} />
                                    </td>
                                    <td style={{ padding: "4px 6px", borderBottom: `1px solid ${C.border}15` }}>
                                      <select value={cfg.type} onChange={e => updateColConfig(name, c, "type", e.target.value)}
                                        style={{ width: "100%", background: C.card, border: `1px solid ${C.border}`, borderRadius: 6, padding: "5px 8px", color: C.text, fontSize: 11, outline: "none", fontFamily: font }}>
                                        <option value="nombre">🔢 Nombre</option>
                                        <option value="texte">🔤 Texte</option>
                                        <option value="date">📅 Date</option>
                                        <option value="catégorie">🏷 Catégorie</option>
                                        <option value="pourcentage">📊 Pourcentage</option>
                                        <option value="monétaire">💰 Monétaire</option>
                                      </select>
                                    </td>
                                    <td style={{ padding: "4px 6px", borderBottom: `1px solid ${C.border}15` }}>
                                      <input value={cfg.desc} onChange={e => updateColConfig(name, c, "desc", e.target.value)} placeholder="Description..."
                                        style={{ width: "100%", background: C.card, border: `1px solid ${C.border}`, borderRadius: 6, padding: "5px 8px", color: C.text2, fontSize: 11, outline: "none", fontFamily: font }}
                                        onFocus={e => e.target.style.borderColor = C.primary} onBlur={e => e.target.style.borderColor = C.border} />
                                    </td>
                                    <td style={{ padding: "5px 8px", color: C.text3, fontSize: 10, fontFamily: mono, borderBottom: `1px solid ${C.border}15`, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 100 }}>{sample}</td>
                                  </tr>
                                );
                              })}
                            </tbody>
                          </table>
                        </div>
                        <div style={{ marginTop: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <span style={{ color: C.text3, fontSize: 10 }}>💡 Renommez les colonnes avec les mots-clés du guide pour améliorer la catégorisation auto</span>
                          <Btn small onClick={() => setExpandedSheet(null)}>✓ OK</Btn>
                        </div>
                      </div>
                    )}

                    {/* Preview table */}
                    {!isExpanded && <div style={{ color: C.text3, fontSize: 10, marginBottom: 6 }}>Colonnes : {cols.slice(0, 8).map(c => colConfig[name]?.[c]?.rename || c).join(" · ")}{cols.length > 8 ? ` (+${cols.length - 8})` : ""}</div>}
                    {!isExpanded && rows.length > 0 && (
                      <div style={{ overflowX: "auto", maxHeight: 100 }}>
                        <table style={{ borderCollapse: "collapse", width: "100%", minWidth: 400 }}>
                          <thead>
                            <tr>{cols.slice(0, 6).map(c => <th key={c} style={{ padding: "4px 8px", textAlign: "left", color: C.primary2, fontSize: 9, fontWeight: 700, borderBottom: `1px solid ${C.border}`, whiteSpace: "nowrap" }}>{colConfig[name]?.[c]?.rename || c}</th>)}</tr>
                          </thead>
                          <tbody>
                            {rows.slice(0, 2).map((row, i) => (
                              <tr key={i}>{cols.slice(0, 6).map(c => <td key={c} style={{ padding: "3px 8px", color: C.text, fontSize: 10, fontFamily: mono, borderBottom: `1px solid ${C.border}11`, whiteSpace: "nowrap" }}>{String(row[c] ?? "").slice(0, 30)}</td>)}</tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                );
              })}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 16 }}>
                <Btn variant="danger" small onClick={deleteAllImported}>🗑 Supprimer tout</Btn>
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn variant="secondary" onClick={() => setShowImportPanel(false)}>Fermer</Btn>
                  <Btn onClick={() => { setData(buildDataFromSheets(rawSheets, sheetAssign)); setShowImportPanel(false); }}>✓ Appliquer</Btn>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
var ls = document.getElementById("loading-screen");
if (ls) ls.style.display = "none";

  </script>
</body>
</html>
