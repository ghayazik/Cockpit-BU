const { useState, useCallback, useRef, useEffect, useMemo } = React;
const _RC = window.Recharts || {};
const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, AreaChart, Area, RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis, ComposedChart, ReferenceLine } = _RC;

async function parseFileToSheets(file) {
  const name = file.name.toLowerCase();
  
  // CSV / TSV
  if (name.endsWith(".csv") || name.endsWith(".tsv")) {
    const text = await file.text();
    const firstLine = text.split("\n")[0] || "";
    const tabCount = (firstLine.match(/\t/g) || []).length;
    const semiCount = (firstLine.match(/;/g) || []).length;
    let delimiter = undefined; // auto-detect
    if (tabCount > 2) delimiter = "\t";
    else if (semiCount > 2) delimiter = ";";
    
    return new Promise((resolve) => {
      Papa.parse(text, {
        header: true, skipEmptyLines: true, dynamicTyping: true, delimiter,
        complete: (r) => {
          const key = file.name.replace(/\.[^.]+$/, "").toLowerCase().replace(/\s+/g, "_");
          resolve(r.data?.length > 0 ? { [key]: r.data } : {});
        },
        error: () => resolve({}),
      });
    });
  }
  
  // XLSX / XLS - parse via arrayBuffer
  const ab = await file.arrayBuffer();
  const bytes = new Uint8Array(ab);
  
  // Check if it's a ZIP (XLSX = ZIP with XML inside)
  if (bytes[0] === 0x50 && bytes[1] === 0x4B) {
    // It's a valid XLSX ZIP file — try to extract sheet data
    // Use a lightweight approach: convert to CSV-like via shared strings + sheet XML
    try {
      const sheets = await parseXLSXFromZip(ab);
      return sheets;
    } catch (e) {
      console.warn("XLSX parse failed:", e);
    }
  }
  
  // Fallback: try as text/CSV
  try {
    const text = await file.text();
    return new Promise((resolve) => {
      Papa.parse(text, {
        header: true, skipEmptyLines: true, dynamicTyping: true,
        complete: (r) => {
          if (r.data?.length > 0 && Object.keys(r.data[0] || {}).length > 1) {
            const key = file.name.replace(/\.[^.]+$/, "").toLowerCase().replace(/\s+/g, "_");
            resolve({ [key]: r.data });
          } else resolve({});
        },
        error: () => resolve({}),
      });
    });
  } catch { return {}; }
}

// Lightweight XLSX parser using JSZip-like manual ZIP extraction
async function parseXLSXFromZip(arrayBuffer) {
  if (!window.JSZip) {
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  
  const zip = await window.JSZip.loadAsync(arrayBuffer);
  const LT = "\x3c"; // < as hex to avoid JSX parser
  const GT = "\x3e"; // >
  
  // Read shared strings
  const sharedStrings = [];
  const ssFile = zip.file("xl/sharedStrings.xml");
  if (ssFile) {
    const ssXml = await ssFile.async("text");
    const siRegex = new RegExp(LT + "si[^" + GT + "]*" + GT + "([\\s\\S]*?)" + LT + "\\/si" + GT, "g");
    let match;
    while ((match = siRegex.exec(ssXml)) !== null) {
      const tRegex = new RegExp(LT + "t[^" + GT + "]*" + GT + "([\\s\\S]*?)" + LT + "\\/t" + GT, "g");
      let tMatch, text = "";
      while ((tMatch = tRegex.exec(match[1])) !== null) {
        text += tMatch[1];
      }
      sharedStrings.push(decodeXmlEntities(text));
    }
  }
  
  // Read workbook to get sheet names
  const wbFile = zip.file("xl/workbook.xml");
  let wbXml = "";
  if (wbFile) {
    wbXml = await wbFile.async("text");
  }
  const sheetNames = [];
  const sheetRegex = new RegExp(LT + 'sheet\\s+name="([^"]*)"[^' + GT + ']*' + GT, "g");
  let sm;
  while ((sm = sheetRegex.exec(wbXml)) !== null) {
    sheetNames.push(sm[1]);
  }
  
  const result = {};
  
  for (let si = 0; si < sheetNames.length; si++) {
    const sheetFile = zip.file("xl/worksheets/sheet" + (si + 1) + ".xml");
    if (!sheetFile) continue;
    const sheetXml = await sheetFile.async("text");
    
    const rows = [];
    const rowRegex = new RegExp(LT + "row[^" + GT + "]*" + GT + "([\\s\\S]*?)" + LT + "\\/row" + GT, "g");
    let rowMatch;
    while ((rowMatch = rowRegex.exec(sheetXml)) !== null) {
      const cells = {};
      const cellRegex = new RegExp(LT + 'c\\s+r="([A-Z]+)\\d+"[^' + GT + ']*(?:t="([^"]*)")?[^' + GT + ']*' + GT + '(?:[\\s\\S]*?' + LT + 'v' + GT + '([\\s\\S]*?)' + LT + '\\/v' + GT + ')?' + '[\\s\\S]*?' + LT + '\\/c' + GT, "g");
      let cellMatch;
      while ((cellMatch = cellRegex.exec(rowMatch[1])) !== null) {
        const col = cellMatch[1];
        const type = cellMatch[2];
        const rawVal = cellMatch[3];
        if (rawVal === undefined || rawVal === null) {
          cells[col] = "";
        } else if (type === "s") {
          cells[col] = sharedStrings[parseInt(rawVal, 10)] || "";
        } else if (type === "b") {
          cells[col] = rawVal === "1";
        } else {
          const num = parseFloat(rawVal);
          cells[col] = isNaN(num) ? rawVal : num;
        }
      }
      rows.push(cells);
    }
    
    if (rows.length >= 2) {
      const headerRow = rows[0];
      const cols = Object.keys(headerRow).sort();
      const headers = cols.map(c => String(headerRow[c]).trim());
      const data = [];
      for (let i = 1; i < rows.length; i++) {
        const obj = {};
        let hasValue = false;
        cols.forEach((c, ci) => {
          const val = rows[i][c];
          obj[headers[ci]] = val !== undefined ? val : "";
          if (val !== undefined && val !== "") hasValue = true;
        });
        if (hasValue) data.push(obj);
      }
      if (data.length > 0) {
        result[sheetNames[si].toLowerCase().replace(/\s+/g, "_")] = data;
      }
    }
  }
  
  return result;
}

function decodeXmlEntities(str) {
  const map = { "&amp;": "&", "&lt;": String.fromCharCode(60), "&gt;": String.fromCharCode(62), "&quot;": '"', "&apos;": "'" };
  return str.replace(/&amp;|&lt;|&gt;|&quot;|&apos;/g, m => map[m] || m);
}

async function parseAllFiles(fileList) {
  const allSheets = {};
  const fileInfos = [];
  for (const file of fileList) {
    try {
      const sheets = await parseFileToSheets(file);
      Object.assign(allSheets, sheets);
      fileInfos.push({ name: file.name, sheets: Object.keys(sheets).length });
    } catch (e) {
      console.warn(`Error parsing ${file.name}:`, e);
      fileInfos.push({ name: file.name, sheets: 0 });
    }
  }
  return { sheets: allSheets, fileInfos };
}

function downloadCSV(data, filename) {
  const csv = Papa.unparse(data);
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

/* ═══════════════════ PERSISTENT DATABASE LAYER ═══════════════════
   Uses Firebase Firestore when configured, falls back to in-memory store.
   All data persists across sessions, deployments, and devices (with Firebase).
   ═══════════════════════════════════════════════════════════════════ */

// Firebase state
let _fb = null;
let _dbMode = "local"; // "local" | "firebase"

async function loadFirebase() {
  const cfg = typeof window !== "undefined" && window.__FIREBASE_CONFIG__;
  if (!cfg || !cfg.apiKey || cfg.apiKey === "VOTRE_API_KEY") {
    console.log("[DB] Using localStorage");
    return false;
  }
  try {
    const loadScript = (src) => new Promise((res, rej) => {
      if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
      const s = document.createElement("script"); s.src = src;
      s.onload = res; s.onerror = rej; document.head.appendChild(s);
    });
    await Promise.all([
      loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"),
      loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"),
    ]);
    if (!window.firebase.apps.length) window.firebase.initializeApp(cfg);
    _fb = window.firebase.firestore();
    _fb.enablePersistence({ synchronizeTabs: true }).catch(() => {});
    _dbMode = "firebase";
    return true;
  } catch (e) {
    console.warn("[DB] Firebase failed:", e);
    return false;
  }
}

const DB = {
  async get(collection, docId) {
    if (_dbMode === "firebase") { const doc = await _fb.collection(collection).doc(docId).get(); return doc.exists ? doc.data() : null; }
    try { return JSON.parse(localStorage.getItem(`bu_${collection}_${docId}`)); } catch { return null; }
  },
  async set(collection, docId, data) {
    if (_dbMode === "firebase") await _fb.collection(collection).doc(docId).set(data, { merge: true });
    localStorage.setItem(`bu_${collection}_${docId}`, JSON.stringify(data));
  },
  async delete(collection, docId) {
    if (_dbMode === "firebase") await _fb.collection(collection).doc(docId).delete();
    localStorage.removeItem(`bu_${collection}_${docId}`);
  },
  async getAll(collection) {
    if (_dbMode === "firebase") { const snap = await _fb.collection(collection).get(); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    const prefix = `bu_${collection}_`;
    const items = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith(prefix)) {
        try { const v = JSON.parse(localStorage.getItem(key)); if (v) items.push({ id: key.slice(prefix.length), ...v }); } catch {}
      }
    }
    return items;
  },
  async setAll(collection, items) {
    for (const item of items) {
      await DB.set(collection, item.id, item);
    }
  },
};

async function initDefaultUsers() {
  const existing = await DB.getAll("users");
  if (existing.length === 0) {
    for (const u of DEFAULT_USERS) {
      await DB.set("users", u.id, u);
    }
  }
}

async function getUsers() {
  return await DB.getAll("users");
}

async function saveUser(user) {
  await DB.set("users", user.id, user);
}

async function saveAllUsers(users) {
  // Clear stale users first for memory mode
  if (_dbMode === "local") {
    const existing = await DB.getAll("users");
    for (const u of existing) {
      if (!users.find(x => x.id === u.id)) await DB.delete("users", u.id);
    }
  }
  await DB.setAll("users", users);
}

async function deleteUserDB(userId) {
  await DB.delete("users", userId);
}

async function authenticateUser(loginId, password) {
  const users = await getUsers();
  return users.find(u => (u.id === loginId || u.email === loginId) && u.password === password && u.actif) || null;
}

/* ═══════════════════ EXCEL ═══════════════════ */
function categorize(sheets) {
  const kw = { financier:["ca","chiffre","revenue","budget","marge","charge","tresorerie","invest","cout","montant","depense","ebitda","backlog","dso","factur"], operationnel:["projet","livraison","sla","incident","satisfaction","client","delai","production","taux","occupation","tjm","ticket","dette","sprint"], rh:["effectif","employe","turnover","formation","absenteisme","salaire","departement","recrutement","competence","certification","seniorite"], gouvernance:["conformite","risque","audit","rgpd","securite","gouvernance","reglementaire","action","score","rse","pca","pra","itil"] };
  const result = {};
  Object.entries(sheets).forEach(([name, rows]) => {
    if (!rows.length) return;
    const txt = (name+" "+Object.keys(rows[0]).join(" ")).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    let best=null, bs=0;
    Object.entries(kw).forEach(([cat, words]) => { const sc = words.filter(w => txt.includes(w)).length; if (sc>bs) { best=cat; bs=sc; } });
    if (best && bs>0) { if (!result[best]) result[best]=[]; result[best].push(...rows); }
  });
  return result;
}

async function exportExcel(allData) {
  // Export all data as CSV (always works)
  const allRows = [];
  const addRows = (label, rows) => { if (rows?.length) rows.forEach(r => allRows.push({ _section: label, ...r })); };
  addRows("Financier_N", allData.financier_n);
  addRows("Financier_N-1", allData.financier_n1);
  addRows("Opérationnel_N", allData.operationnel_n);
  addRows("Opérationnel_N-1", allData.operationnel_n1);
  addRows("RH", allData.rh);
  addRows("Gouvernance", allData.gouvernance);
  downloadCSV(allRows, "Dashboard_BU_Export.csv");
}

/* ═══════════════════ CHANGE PASSWORD MODAL ═══════════════════ */
function PasswordModal({ user, onClose, onSave }) {
  const [current, setCurrent] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirm, setConfirm] = useState("");
  const [error, setError] = useState("");
  const [success, setSuccess] = useState(false);

  const handleSave = () => {
    if (current !== user.password) { setError("Mot de passe actuel incorrect"); return; }
    if (newPw.length < 4) { setError("Minimum 4 caractères"); return; }
    if (newPw !== confirm) { setError("Les mots de passe ne correspondent pas"); return; }
    onSave(newPw);
    setSuccess(true);
    setTimeout(onClose, 1200);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2000 }} onClick={onClose}>

            <div style={{ fontSize: 48, marginBottom: 12 }}>✅</div>
            <p style={{ color: C.accent, fontSize: 14, fontWeight: 700 }}>Mot de passe modifié avec succès</p>
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Input label="Mot de passe actuel" type="password" value={current} onChange={v => { setCurrent(v); setError(""); }} icon="🔒" />
            <Input label="Nouveau mot de passe" type="password" value={newPw} onChange={v => { setNewPw(v); setError(""); }} icon="🔐" />
            <Input label="Confirmer" type="password" value={confirm} onChange={v => { setConfirm(v); setError(""); }} icon="🔐" />
            {error && <div style={{ color: C.danger, fontSize: 12, fontWeight: 600, background: C.dangerDim, padding: "8px 12px", borderRadius: 6 }}>⚠ {error}</div>}

            </div>

        )}

    </div>
  );
}

                        <Badge color={roleColors[u.role]}>{roleLabels[u.role]}</Badge>
                        {!u.actif && <Badge color={C.danger}>Inactif</Badge>}
                        {u.id === currentUser.id && <Badge color={C.accent}>Vous</Badge>}
                      </div>
                      <div style={{ color: C.text3, fontSize: 11, marginTop: 2 }}>
                        ID: <span style={{ fontFamily: mono, color: C.text2 }}>{u.id}</span>
                        {u.email && <> · {u.email}</>}
                        {" · MdP: "}<span style={{ fontFamily: mono, color: C.text2 }}>{"•".repeat(u.password.length)}</span>
                      </div>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <Btn variant="secondary" small onClick={() => resetPassword(u.id)}>🔑 Reset MdP</Btn>
                    <Btn variant={u.actif ? "ghost" : "success"} small onClick={() => toggleActive(u.id)}>{u.actif ? "Désactiver" : "Réactiver"}</Btn>
                    {u.id !== "admin" && u.id !== currentUser.id && <Btn variant="danger" small onClick={() => deleteUser(u.id)}>✕</Btn>}
                  </div>
                </div>

                {/* Vision rights */}
                <div>
                  <div style={{ color: C.text3, fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Droits de visualisation des dashboards</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    {VISIONS.map(v => {
                      const active = u.visions.includes(v);
                      return (
                        <button key={v} onClick={() => toggleVision(u.id, v)}
                          style={{
                            flex: 1, padding: "10px 8px", borderRadius: 10, cursor: "pointer",
                            background: active ? C.primaryDim : C.bg,
                            border: `1px solid ${active ? C.primary + "50" : C.border}`,
                            transition: "all 0.2s", textAlign: "center",
                          }}>
                          <div style={{ fontSize: 18, marginBottom: 4 }}>
                            {v === "financier" ? "💰" : v === "operationnel" ? "⚙️" : v === "rh" ? "👥" : "🏛"}
                          </div>
                          <div style={{ color: active ? C.primary2 : C.text3, fontSize: 10, fontWeight: 700 }}>{VISION_LABELS[v]}</div>
                          <div style={{ marginTop: 4, width: 8, height: 8, borderRadius: "50%", background: active ? C.accent : C.text3 + "40", margin: "0 auto",
                            boxShadow: active ? `0 0 8px ${C.accent}50` : "none" }} />
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Footer */}
        <div style={{ padding: "14px 28px", borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
          <span style={{ color: C.text3, fontSize: 11 }}>{users.length} utilisateur(s) · {users.filter(u => u.actif).length} actif(s)</span>
          <Btn variant="secondary" onClick={onClose} small>Fermer</Btn>
        </div>
      </div>
    </div>
  );
}

function FinancierView({ dataN, dataN1 }) {
  if (!dataN?.length) return <Empty />;
  const last = dataN.length-1;
  const totalCA = dataN.reduce((s,r) => s+(r.ca_reel||0),0);
  const totalCA1 = dataN1?.reduce((s,r) => s+(r.ca_reel||0),0)||0;
  const totalBudget = dataN.reduce((s,r) => s+(r.ca_budget||0),0);
  const totalMarge = dataN.reduce((s,r) => s+(r.marge_projet||0),0);
  const totalMarge1 = dataN1?.reduce((s,r) => s+(r.marge_projet||0),0)||0;
  const backlog = dataN[last]?.backlog||0;
  const backlog1 = dataN1?.[last]?.backlog||0;
  const avgDSO = Math.round(dataN.reduce((s,r) => s+(r.dso_jours||0),0)/dataN.length);
  const ecart = totalBudget ? ((totalCA-totalBudget)/totalBudget*100).toFixed(1) : 0;
  const dCA = delta(totalCA, totalCA1);
  const combined = dataN.map((r,i) => ({...r, ca_n1: dataN1?.[i]?.ca_reel, marge_n1: dataN1?.[i]?.marge_projet}));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

        <KPI label="Écart Budget" value={ecart+"%"} icon="📊" trend={ecart>=0?"up":"down"} trendLabel={ecart>=0?"Surperformance":"Sous-performance"} />
        <KPI label="Marge Projets" value={fmt(totalMarge)} unit="MAD" icon="🎯" trend={delta(totalMarge,totalMarge1)>0?"up":"down"} trendLabel={pct(totalCA?totalMarge/totalCA*100:0)+" du CA"} />
        <KPI label="Backlog" value={fmt(backlog)} unit="MAD" icon="📦" trend={backlog>backlog1?"up":"down"} trendLabel={delta(backlog,backlog1)!==null?(delta(backlog,backlog1)>0?"+":"")+delta(backlog,backlog1).toFixed(1)+"%":"—"} />
        <KPI label="DSO Moyen" value={avgDSO} unit="jours" icon="⏳" trend={avgDSO<=50?"up":"down"} trendLabel={avgDSO<=50?"Bon":"À surveiller"} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 14 }}>
        <Card title="CA Réel vs Budget vs N-1" badge={<Badge>Mensuel</Badge>}>
          <ResponsiveContainer width="100%" height={280}><ComposedChart data={combined}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="mois" tick={{fill:C.text3,fontSize:10}}/><YAxis tick={{fill:C.text3,fontSize:10}} tickFormatter={v=>fmt(v)}/><Tooltip contentStyle={ttStyle} formatter={v=>fmt(v)+" MAD"}/><Legend wrapperStyle={{fontSize:11}}/><Bar dataKey="ca_reel" fill={C.primary} radius={[3,3,0,0]} name="CA N"/><Line type="monotone" dataKey="ca_budget" stroke={C.warn} strokeWidth={2} strokeDasharray="5 5" dot={false} name="Budget"/><Line type="monotone" dataKey="ca_n1" stroke={C.text3} strokeWidth={1.5} dot={false} name="CA N-1"/></ComposedChart></ResponsiveContainer>
        </Card>
        <Card title="Comparaison N vs N-1">
          <div style={{display:"flex",flexDirection:"column"}}><div style={{display:"flex",justifyContent:"space-between",padding:"4px 0 8px",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.text3,fontSize:10,flex:1}}>Indicateur</span><span style={{color:C.primary,fontSize:10,width:90,textAlign:"right"}}>N</span><span style={{color:C.text3,fontSize:10,width:90,textAlign:"right"}}>N-1</span><span style={{color:C.text3,fontSize:10,width:70,textAlign:"right"}}>Δ</span></div>
            <ComparisonRow label="CA Total" valN={totalCA} valN1={totalCA1}/><ComparisonRow label="Marge Projets" valN={totalMarge} valN1={totalMarge1}/><ComparisonRow label="Backlog" valN={backlog} valN1={backlog1}/><ComparisonRow label="DSO" valN={avgDSO} valN1={dataN1?.length?Math.round(dataN1.reduce((s,r)=>s+(r.dso_jours||0),0)/dataN1.length):null} unit="j"/>

        </Card>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Card title="Marge Projet — Évolution mensuelle"><ResponsiveContainer width="100%" height={240}><AreaChart data={combined}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="mois" tick={{fill:C.text3,fontSize:10}}/><YAxis tick={{fill:C.text3,fontSize:10}} tickFormatter={v=>fmt(v)}/><Tooltip contentStyle={ttStyle} formatter={v=>fmt(v)+" MAD"}/><Area type="monotone" dataKey="marge_projet" fill={C.accent+"30"} stroke={C.accent} strokeWidth={2} name="Marge N"/><Area type="monotone" dataKey="marge_n1" fill={C.text3+"15"} stroke={C.text3} strokeWidth={1.5} name="Marge N-1"/></AreaChart></ResponsiveContainer></Card>

      </div>
    </div>
  );
}

function RHView({ data }) {
  if (!data?.length) return <Empty />;
  const total = data.reduce((s,r)=>s+(r.effectif||0),0);
  const avgOcc = (data.reduce((s,r)=>s+(r.taux_occupation||0),0)/data.length).toFixed(1);
  const avgTO = (data.reduce((s,r)=>s+(r.turnover||0),0)/data.length).toFixed(1);
  const avgSat = (data.reduce((s,r)=>s+(r.satisfaction||0),0)/data.length).toFixed(1);
  const totalCerts = data.reduce((s,r)=>s+(r.certifications||0),0);
  const radarData = data.map(r => ({ dept: r.departement||Object.values(r)[0], Occupation: r.taux_occupation||0, Satisfaction: (r.satisfaction||0)*20, Rétention: 100-(r.turnover||0), Formation: Math.min((r.formation_h||0)/1.6,100) }));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 14 }}>
        <KPI label="Effectif Total BU" value={total} icon="👥"/><KPI label="Taux Occupation RH" value={avgOcc+"%"} icon="📈" trend={avgOcc>=80?"up":"down"} trendLabel={avgOcc>=85?"Optimal":"À optimiser"}/><KPI label="Turnover Moyen" value={avgTO+"%"} icon="🔄" trend={avgTO<10?"up":"down"} trendLabel={avgTO<10?"Stable":"Risque rétention"}/><KPI label="Satisfaction" value={avgSat} unit="/5" icon="😊" trend={avgSat>=4?"up":"down"}/><KPI label="Certifications" value={totalCerts} icon="🎓" trend="up" trendLabel="Actives"/>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Card title="Radar RH par Département"><ResponsiveContainer width="100%" height={300}><RadarChart data={radarData}><PolarGrid stroke={C.border}/><PolarAngleAxis dataKey="dept" tick={{fill:C.text2,fontSize:10}}/><PolarRadiusAxis tick={{fill:C.text3,fontSize:9}} domain={[0,100]}/><Radar name="Occupation" dataKey="Occupation" stroke={C.primary} fill={C.primary} fillOpacity={0.12} strokeWidth={2}/><Radar name="Satisfaction" dataKey="Satisfaction" stroke={C.accent} fill={C.accent} fillOpacity={0.1}/><Radar name="Rétention" dataKey="Rétention" stroke={C.warn} fill={C.warn} fillOpacity={0.08}/><Tooltip contentStyle={ttStyle}/><Legend wrapperStyle={{fontSize:11}}/></RadarChart></ResponsiveContainer></Card>
        <Card title="Effectifs & Occupation par Département"><ResponsiveContainer width="100%" height={300}><ComposedChart data={data} layout="vertical"><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis type="number" tick={{fill:C.text3,fontSize:10}}/><YAxis type="category" dataKey="departement" tick={{fill:C.text2,fontSize:10}} width={130}/><Tooltip contentStyle={ttStyle}/><Bar dataKey="effectif" fill={C.primary} radius={[0,3,3,0]} name="Effectif" barSize={14}/><Bar dataKey="taux_occupation" fill={C.accent+"80"} radius={[0,3,3,0]} name="Occupation %" barSize={14}/></ComposedChart></ResponsiveContainer></Card>
      </div>
      <Card title="Tableau Détaillé RH" span={2}>
        <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{Object.keys(data[0]).map(c=><th key={c} style={{padding:"8px 12px",textAlign:"left",color:C.primary2,fontSize:10,fontWeight:700,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`,background:C.bg,position:"sticky",top:0,letterSpacing:0.8}}>{c.replace(/_/g," ")}</th>)}</tr></thead><tbody>{data.map((row,i)=><tr key={i} style={{background:i%2?C.bg+"80":"transparent"}}>{Object.entries(row).map(([k,v],j)=>{let col=C.text;if(k==="turnover"&&v>12)col=C.danger;if(k==="taux_occupation"&&v<80)col=C.warn;if(k==="satisfaction"&&v>=4)col=C.accent;return <td key={j} style={{padding:"7px 12px",color:col,fontSize:12,fontFamily:j>0?mono:"inherit",borderBottom:`1px solid ${C.border}11`}}>{typeof v==="number"?v.toLocaleString("fr-FR"):v}</td>})}</tr>)}</tbody></table></div>
      </Card>
    </div>
  );
}

function GouvernanceView({ data }) {
  if (!data?.length) return <Empty />;
  const avg = (data.reduce((s,r)=>s+(r.score||0),0)/data.length).toFixed(0);
  const highRisk = data.filter(r=>(r.risque||"").toLowerCase().includes("élev")).length;
  const totalOpen = data.reduce((s,r)=>s+(r.actions_ouvertes||0),0);
  const totalClosed = data.reduce((s,r)=>s+(r.actions_fermees||0),0);
  const riskCol = (r) => { const t=(r||"").toLowerCase(); return t.includes("élev")?C.danger:t.includes("moy")?C.warn:C.accent; };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 14 }}>
        <KPI label="Score Gouvernance" value={avg} unit="/100" icon="🏛" trend={avg>=70?"up":"down"} trendLabel={avg>=75?"Conforme":"À risque"}/><KPI label="Risques Élevés" value={highRisk} icon="🔴" trend={highRisk<=2?"up":"down"} trendLabel={`sur ${data.length} domaines`}/><KPI label="Actions Ouvertes" value={totalOpen} icon="📋" trend="down" trendLabel="En cours"/><KPI label="Actions Fermées" value={totalClosed} icon="✅" trend="up" trendLabel={pct(totalClosed/(totalOpen+totalClosed)*100)+" complétion"}/>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Card title="Scores de Conformité"><ResponsiveContainer width="100%" height={320}><BarChart data={data} layout="vertical"><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis type="number" domain={[0,100]} tick={{fill:C.text3,fontSize:10}}/><YAxis type="category" dataKey="domaine" tick={{fill:C.text2,fontSize:9}} width={180}/><Tooltip contentStyle={ttStyle}/><ReferenceLine x={70} stroke={C.warn} strokeDasharray="4 4"/><Bar dataKey="score" radius={[0,4,4,0]} name="Score" barSize={16}>{data.map((e,i)=><Cell key={i} fill={e.score>=80?C.accent:e.score>=65?C.warn:C.danger}/>)}</Bar></BarChart></ResponsiveContainer></Card>
        <Card title="Matrice des Risques IT">
          <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:320,overflowY:"auto"}}>
            {data.sort((a,b)=>(b.actions_ouvertes||0)-(a.actions_ouvertes||0)).map((r,i)=>(
              <div key={i} style={{background:C.bg,borderRadius:10,padding:"12px 16px",border:`1px solid ${riskCol(r.risque)}20`,display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:riskCol(r.risque),boxShadow:`0 0 10px ${riskCol(r.risque)}50`,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}><div style={{color:C.text,fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.domaine}</div><div style={{color:C.text3,fontSize:10,marginTop:2}}>{r.responsable} · Éch. {r.echeance}</div></div>
                <div style={{textAlign:"right",flexShrink:0}}><div style={{color:C.text,fontSize:13,fontWeight:700,fontFamily:mono}}>{r.score}/100</div><Badge color={riskCol(r.risque)}>{r.risque}</Badge></div>
              </div>
            ))}
          </div>
        </Card>
      </div>
      <Card title="Suivi des Actions Correctives" span={2}><ResponsiveContainer width="100%" height={240}><BarChart data={data}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="domaine" tick={{fill:C.text3,fontSize:9}} angle={-20} textAnchor="end" height={60}/><YAxis tick={{fill:C.text3,fontSize:10}}/><Tooltip contentStyle={ttStyle}/><Legend wrapperStyle={{fontSize:11}}/><Bar dataKey="actions_ouvertes" fill={C.danger} radius={[3,3,0,0]} name="Ouvertes" stackId="a"/><Bar dataKey="actions_fermees" fill={C.accent} radius={[3,3,0,0]} name="Fermées" stackId="a"/></BarChart></ResponsiveContainer></Card>
    </div>
  );
}

function Empty() { return <div style={{color:C.text3,textAlign:"center",padding:60,fontSize:14}}>Aucune donnée disponible. Importez vos fichiers Excel.</div>; }

/* ═══════════════════ AUTRE VIEW — Non-categorized data ═══════════════════ */
function AutreView({ data, sheetsMap }) {
  if (!sheetsMap || Object.keys(sheetsMap).length === 0) return <Empty />;

  const analyzeColumns = (rows) => {
    if (!rows || rows.length === 0) return {};
    const cols = Object.keys(rows[0]);
    const analysis = {};
    cols.forEach(col => {
      const vals = rows.map(r => r[col]).filter(v => v !== "" && v !== null && v !== undefined);
      const nums = vals.filter(v => typeof v === "number" || (!isNaN(parseFloat(v)) && isFinite(v)));
      const isNumeric = nums.length > vals.length * 0.6;
      if (isNumeric) {
        const numVals = nums.map(v => typeof v === "number" ? v : parseFloat(v));
        analysis[col] = {
          type: "numeric", count: vals.length,
          min: Math.min(...numVals), max: Math.max(...numVals),
          avg: numVals.reduce((a, b) => a + b, 0) / numVals.length,
          sum: numVals.reduce((a, b) => a + b, 0),
        };
      } else {
        const unique = [...new Set(vals.map(v => String(v)))];
        analysis[col] = { type: "text", count: vals.length, unique: unique.length, samples: unique.slice(0, 5) };
      }
    });
    return analysis;
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ background: C.card, border: `1px solid ${C.warn}30`, borderRadius: 14, padding: "16px 22px" }}>
        <div style={{ color: C.warn, fontSize: 13, fontWeight: 700, marginBottom: 4 }}>📁 Données non catégorisées</div>
        <div style={{ color: C.text2, fontSize: 12 }}>
          {Object.keys(sheetsMap).length} feuille(s) non assignée(s). Utilisez le bouton 📁 Gérer fichiers pour les affecter à une vision, ou explorez-les ci-dessous.
        </div>
      </div>

      {Object.entries(sheetsMap).map(([sheetName, rows]) => {
        const cols = rows.length > 0 ? Object.keys(rows[0]) : [];
        const analysis = analyzeColumns(rows);
        const numericCols = Object.entries(analysis).filter(([, a]) => a.type === "numeric");
        const textCols = Object.entries(analysis).filter(([, a]) => a.type === "text");

        return (
          <div key={sheetName} style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {/* Sheet header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <span style={{ color: C.text, fontSize: 16, fontWeight: 800 }}>{sheetName}</span>
                <span style={{ color: C.text3, fontSize: 12, marginLeft: 10 }}>{rows.length} lignes · {cols.length} colonnes</span>
              </div>
            </div>

            {/* Column analysis cards */}
            {numericCols.length > 0 && (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
                {numericCols.slice(0, 8).map(([col, a]) => (
                  <KPI key={col} label={col} value={fmt(a.sum)} unit={a.avg > 1000 ? "" : ""} icon="📊"
                    trend={a.avg > 0 ? "up" : "down"} trendLabel={`Moy: ${fmt(a.avg)}`}
                    subtitle={`Min: ${fmt(a.min)} · Max: ${fmt(a.max)}`} />
                ))}
              </div>
            )}

            {/* Auto-generated charts for numeric columns */}
            {numericCols.length >= 2 && (
              <div style={{ display: "grid", gridTemplateColumns: numericCols.length >= 4 ? "1fr 1fr" : "1fr", gap: 14 }}>
                <Card title={`Évolution — ${sheetName}`}>
                  <ResponsiveContainer width="100%" height={260}>
                    <ComposedChart data={rows}>
                      <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                      <XAxis dataKey={textCols.length > 0 ? textCols[0][0] : cols[0]} tick={{ fill: C.text3, fontSize: 10 }} />
                      <YAxis tick={{ fill: C.text3, fontSize: 10 }} tickFormatter={v => fmt(v)} />
                      <Tooltip contentStyle={ttStyle} formatter={v => fmt(v)} />
                      <Legend wrapperStyle={{ fontSize: 11 }} />
                      {numericCols.slice(0, 4).map(([col], i) => (
                        i === 0
                          ? <Bar key={col} dataKey={col} fill={CHART_COLORS[i]} radius={[3, 3, 0, 0]} name={col} />
                          : <Line key={col} type="monotone" dataKey={col} stroke={CHART_COLORS[i]} strokeWidth={2} dot={false} name={col} />
                      ))}
                    </ComposedChart>
                  </ResponsiveContainer>
                </Card>
                {numericCols.length >= 3 && (
                  <Card title={`Répartition — ${numericCols[0][0]}`}>
                    <ResponsiveContainer width="100%" height={260}>
                      <BarChart data={rows} layout="vertical">
                        <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                        <XAxis type="number" tick={{ fill: C.text3, fontSize: 10 }} tickFormatter={v => fmt(v)} />
                        <YAxis type="category" dataKey={textCols.length > 0 ? textCols[0][0] : cols[0]} tick={{ fill: C.text2, fontSize: 9 }} width={120} />
                        <Tooltip contentStyle={ttStyle} formatter={v => fmt(v)} />
                        <Bar dataKey={numericCols[0][0]} radius={[0, 4, 4, 0]} name={numericCols[0][0]}>
                          {rows.map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </Card>
                )}
              </div>
            )}

            {/* Data table */}
            <Card title="Données brutes">
              <div style={{ overflowX: "auto", maxHeight: 320 }}>
                <table style={{ width: "100%", borderCollapse: "collapse", minWidth: cols.length * 120 }}>
                  <thead>
                    <tr>{cols.map(c => (
                      <th key={c} style={{ padding: "8px 10px", textAlign: "left", color: analysis[c]?.type === "numeric" ? C.primary2 : C.text2, fontSize: 10, fontWeight: 700, textTransform: "uppercase", borderBottom: `1px solid ${C.border}`, background: C.bg, position: "sticky", top: 0, whiteSpace: "nowrap" }}>
                        {c} <span style={{ color: C.text3, fontWeight: 400 }}>({analysis[c]?.type === "numeric" ? "num" : "txt"})</span>
                      </th>
                    ))}</tr>
                  </thead>
                  <tbody>{rows.slice(0, 50).map((row, i) => (
                    <tr key={i} style={{ background: i % 2 ? C.bg + "80" : "transparent" }}>
                      {cols.map(c => (
                        <td key={c} style={{ padding: "6px 10px", color: C.text, fontSize: 11, fontFamily: analysis[c]?.type === "numeric" ? mono : "inherit", borderBottom: `1px solid ${C.border}11`, whiteSpace: "nowrap" }}>
                          {typeof row[c] === "number" ? row[c].toLocaleString("fr-FR") : String(row[c] ?? "")}
                        </td>
                      ))}
                    </tr>
                  ))}</tbody>
                </table>
                {rows.length > 50 && <div style={{ padding: 10, textAlign: "center", color: C.text3, fontSize: 11 }}>... et {rows.length - 50} lignes supplémentaires</div>}
              </div>
            </Card>

            {/* AI suggestion */}
            <div style={{ background: C.primaryDim + "30", border: `1px solid ${C.primary}30`, borderRadius: 12, padding: "14px 20px" }}>
              <div style={{ color: C.primary2, fontSize: 12, fontWeight: 700, marginBottom: 6 }}>💡 Suggestion d'analyse IA</div>
              <div style={{ color: C.text2, fontSize: 11, lineHeight: 1.6 }}>
                Cette feuille contient {numericCols.length} colonne(s) numérique(s) ({numericCols.map(([c]) => c).join(", ")}) et {textCols.length} colonne(s) texte ({textCols.map(([c]) => c).join(", ")}).
                {numericCols.length >= 2 && " Les données se prêtent à une analyse de tendances et de comparaisons."}
                {numericCols.length >= 1 && textCols.length >= 1 && " Une ventilation par catégorie est possible."}
                {" Utilisez le bouton 🤖 IA pour une analyse approfondie."}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════ AI PANEL ═══════════════════ */
function AIPanel({ data, vision, onClose }) {
  const [analysis, setAnalysis] = useState("");
  const [loading, setLoading] = useState(false);
  const [prompt, setPrompt] = useState("");
  const analyze = async (q) => {
    setLoading(true); setAnalysis("");
    const snap = JSON.stringify(data).slice(0,6000);
    const sys = `Tu es un analyste stratégique senior spécialisé en pilotage de BU IT / Digital / Transformation au Maroc. Vision "${vision}".\nRéponds en français :\n1. 📊 SYNTHÈSE EXÉCUTIVE\n2. ✅ POINTS FORTS\n3. ⚠️ RISQUES (🔴 Critique / 🟠 Élevé / 🟡 Modéré)\n4. 💡 PRÉCONISATIONS\n5. 📈 TENDANCES`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content:(q||`Analyse vision ${vision}`)+"\n\nDonnées:\n"+snap}]})});
      const d = await res.json(); setAnalysis((d.content||[]).map(b=>b.text||"").join("\n")||"Erreur.");
    } catch { setAnalysis("Erreur de connexion."); }
    setLoading(false);
  };
  useEffect(()=>{ if(data) analyze(); },[data,vision]);
  const quickQ = ["Risques majeurs ?","Taux d'occupation : leviers ?","Backlog soutenable ?","Plan d'action Q1"];

  return (
    <div style={{position:"fixed",top:0,right:0,width:520,height:"100vh",background:`linear-gradient(180deg,${C.card} 0%,${C.bg} 100%)`,borderLeft:`2px solid ${C.primary}40`,zIndex:1000,display:"flex",flexDirection:"column",boxShadow:"-8px 0 40px rgba(0,0,0,0.6)"}}>
      <div style={{padding:"16px 22px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{color:C.text,fontSize:15,fontWeight:800}}>🤖 Analyse IA</div><div style={{color:C.primary2,fontSize:11}}>Vision : {vision}</div></div>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.text3,fontSize:20,cursor:"pointer"}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:22}}>
        {loading ? <div style={{textAlign:"center",paddingTop:60}}><div style={{fontSize:44,animation:"spin 2s linear infinite"}}>🧠</div><style>{`@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}`}</style><p style={{color:C.primary2,fontSize:13,marginTop:12}}>Analyse en cours...</p></div>
        : <div style={{color:C.text,fontSize:13.5,lineHeight:1.85,whiteSpace:"pre-wrap"}}>{analysis}</div>}
      </div>
      <div style={{padding:"12px 22px",borderTop:`1px solid ${C.border}`}}>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder="Question spécifique..." onKeyDown={e=>{if(e.key==="Enter"&&prompt.trim()){analyze(prompt);setPrompt("");}}} style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 14px",color:C.text,fontSize:12,outline:"none"}}/>
          <Btn onClick={()=>{if(prompt.trim()){analyze(prompt);setPrompt("");}}} small>→</Btn>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{quickQ.map(q=><button key={q} onClick={()=>analyze(q)} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 10px",color:C.text3,fontSize:10,cursor:"pointer"}}>{q}</button>)}</div>
      </div>
    </div>
  );
}

/* ═══════════════════ DATA ENTRY STORAGE ═══════════════════ */
const MONTHS_FR = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const CURRENT_YEAR = 2026;

function emptyRow(mois, annee) {
  return {
    mois, annee,
    effectif_actuel: "", effectif_n1: "", effectif_n2: "", effectif_n3: "",
    sla_actuel: "", sla_prev: "",
    csat: "",
    pm_actuel: "", pm_prev: "",
    ca_actuel: "", ca_prev: "",
    commentaire: "",
  };
}

/* ═══════════════════ DATA ENTRY PANEL ═══════════════════ */
function DataEntryPanel({ currentUser, onClose }) {
  const [projects, setProjects] = useState([]);
  const [selProject, setSelProject] = useState(null);
  const [newName, setNewName] = useState("");
  const [toast, setToast] = useState("");
  const [selYear, setSelYear] = useState(CURRENT_YEAR);
  const [editingCell, setEditingCell] = useState(null);
  const [loadingProjects, setLoadingProjects] = useState(true);

  useEffect(() => {
    getProjectsDB().then(p => { setProjects(p); setLoadingProjects(false); });
  }, []);

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(""), 2500); };

  const addProject = async () => {
    if (!newName.trim()) { showToast("⚠ Saisissez un nom de projet"); return; }
    if (projects.find(p => p.name.toLowerCase() === newName.trim().toLowerCase())) { showToast("⚠ Ce projet existe déjà"); return; }
    const p = { id: Date.now().toString(36), name: newName.trim(), createdBy: currentUser.id, createdAt: new Date().toISOString(), data: {} };
    MONTHS_FR.forEach((m, i) => { p.data[`${CURRENT_YEAR}-${i}`] = emptyRow(m, CURRENT_YEAR); });
    const updated = [...projects, p];
    setProjects(updated);
    await saveProjectDB(p);
    setSelProject(p.id); setNewName("");
    showToast("✅ Projet ajouté");
  };

  const handleDeleteProject = async (id) => {
    await deleteProjectDB(id);
    const updated = projects.filter(p => p.id !== id);
    setProjects(updated);
    if (selProject === id) setSelProject(updated[0]?.id || null);
    showToast("✅ Projet supprimé");
  };

  // Debounced save to DB
  const saveToDBRef = useRef(null);
  if (!saveToDBRef.current) {
    saveToDBRef.current = _.debounce(async (proj) => {
      try { await saveProjectDB(proj); } catch (e) { console.warn("Save error:", e); }
    }, 800);
  }

  const updateCell = (projectId, key, field, value) => {
    const updated = projects.map(p => {
      if (p.id !== projectId) return p;
      const d = { ...p.data };
      if (!d[key]) d[key] = emptyRow(MONTHS_FR[parseInt(key.split("-")[1])], parseInt(key.split("-")[0]));
      d[key] = { ...d[key], [field]: value };
      const updatedProject = { ...p, data: d };
      saveToDBRef.current(updatedProject);
      return updatedProject;
    });
    setProjects(updated);
  };

  const project = projects.find(p => p.id === selProject);
  const yearKeys = MONTHS_FR.map((_, i) => `${selYear}-${i}`);

  const exportProjectExcel = async () => {
    const allRows = [];
    projects.forEach(p => {
      MONTHS_FR.forEach((m, i) => {
        const key = `${selYear}-${i}`;
        const d = p.data[key] || emptyRow(m, selYear);
        allRows.push({
          "Projet": p.name, "Mois": m, "Année": selYear,
          "Effectif Actuel": d.effectif_actuel, "Effectif N+1": d.effectif_n1, "Effectif N+2": d.effectif_n2, "Effectif N+3": d.effectif_n3,
          "SLA Actuel %": d.sla_actuel, "SLA Prév. %": d.sla_prev,
          "CSAT /5": d.csat,
          "PM Actuel": d.pm_actuel, "PM Prév.": d.pm_prev,
          "CA Actuel": d.ca_actuel, "CA Prév.": d.ca_prev,
          "Commentaire": d.commentaire,
        });
      });
    });
    downloadCSV(allRows, `Saisie_Projets_${selYear}.csv`);
    showToast("✅ Export généré");
  };

  const fields = [
    { key: "effectif_actuel", label: "Eff. Actuel", group: "Effectifs", color: C.primary },
    { key: "effectif_n1", label: "Eff. N+1", group: "Effectifs", color: C.primary },
    { key: "effectif_n2", label: "Eff. N+2", group: "Effectifs", color: C.primary },
    { key: "effectif_n3", label: "Eff. N+3", group: "Effectifs", color: C.primary },
    { key: "sla_actuel", label: "SLA Act. %", group: "SLA", color: C.accent },
    { key: "sla_prev", label: "SLA Prév. %", group: "SLA", color: C.accent },
    { key: "csat", label: "CSAT /5", group: "CSAT", color: C.warn },
    { key: "pm_actuel", label: "PM Act.", group: "Projet Marge", color: "#8b5cf6" },
    { key: "pm_prev", label: "PM Prév.", group: "Projet Marge", color: "#8b5cf6" },
    { key: "ca_actuel", label: "CA Act.", group: "Chiffre d'Affaires", color: "#ec4899" },
    { key: "ca_prev", label: "CA Prév.", group: "Chiffre d'Affaires", color: "#ec4899" },
    { key: "commentaire", label: "Commentaire", group: "Notes", color: C.text3 },
  ];

  const groups = [...new Set(fields.map(f => f.group))];

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", zIndex: 1500 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ margin: "auto", width: "95vw", maxWidth: 1400, height: "92vh", background: C.surface, borderRadius: 20, border: `1px solid ${C.border}`, display: "flex", flexDirection: "column", overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.6)" }}>

        {/* Header */}
        <div style={{ padding: "18px 28px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
          <div>
            <h2 style={{ color: C.text, fontSize: 18, fontWeight: 900, margin: 0 }}>📝 Saisie Mensuelle — Données Projets</h2>
            <p style={{ color: C.text3, fontSize: 11, margin: "4px 0 0" }}>Effectifs, SLA, CSAT, PM, CA — Actuel & Prévisionnel N+1 à N+3</p>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <select value={selYear} onChange={e => setSelYear(Number(e.target.value))} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 14px", color: C.text, fontSize: 12, outline: "none", fontFamily: font }}>
              {[2024, 2025, 2026, 2027].map(y => <option key={y} value={y}>{y}</option>)}
            </select>
            {projects.length > 0 && <Btn variant="success" onClick={exportProjectExcel} small>📥 Export Excel</Btn>}
            <button onClick={onClose} style={{ background: "none", border: "none", color: C.text3, fontSize: 22, cursor: "pointer" }}>✕</button>
          </div>
        </div>

        {toast && <div style={{ margin: "10px 28px 0", padding: "8px 14px", borderRadius: 8, background: toast.includes("⚠") ? C.warnDim : C.accentDim, color: toast.includes("⚠") ? C.warn : C.accent, fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{toast}</div>}

        <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
          {/* Sidebar - Projects list */}
          <div style={{ width: 260, borderRight: `1px solid ${C.border}`, display: "flex", flexDirection: "column", flexShrink: 0 }}>
            <div style={{ padding: "14px 16px", borderBottom: `1px solid ${C.border}` }}>
              <div style={{ display: "flex", gap: 6 }}>
                <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Nom du projet..." onKeyDown={e => { if (e.key === "Enter") addProject(); }}
                  style={{ flex: 1, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", color: C.text, fontSize: 12, outline: "none", fontFamily: font }}
                  onFocus={e => e.target.style.borderColor = C.primary} onBlur={e => e.target.style.borderColor = C.border} />
                <Btn onClick={addProject} small>+</Btn>
              </div>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: 8 }}>
              {projects.length === 0 && <div style={{ textAlign: "center", padding: 30, color: C.text3, fontSize: 12 }}>Aucun projet. Ajoutez-en un ci-dessus.</div>}
              {projects.map(p => {
                const filled = yearKeys.filter(k => {
                  const d = p.data[k]; if (!d) return false;
                  return Object.entries(d).some(([fk, fv]) => fk !== "mois" && fk !== "annee" && fv !== "" && fv !== null && fv !== undefined);
                }).length;
                return (
                  <div key={p.id} onClick={() => setSelProject(p.id)} style={{
                    background: selProject === p.id ? C.primaryDim : "transparent",
                    border: `1px solid ${selProject === p.id ? C.primary + "40" : "transparent"}`,
                    borderRadius: 10, padding: "12px 14px", cursor: "pointer", marginBottom: 4, transition: "all 0.15s",
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <div style={{ color: C.text, fontSize: 13, fontWeight: 700 }}>{p.name}</div>
                        <div style={{ color: C.text3, fontSize: 10, marginTop: 2 }}>{filled}/12 mois renseignés</div>
                      </div>
                      <button onClick={e => { e.stopPropagation(); handleDeleteProject(p.id); }} style={{ background: "none", border: "none", color: C.text3, cursor: "pointer", fontSize: 14, padding: 4, borderRadius: 4 }}
                        onMouseEnter={e => { e.currentTarget.style.color = C.danger; e.currentTarget.style.background = C.dangerDim; }}
                        onMouseLeave={e => { e.currentTarget.style.color = C.text3; e.currentTarget.style.background = "none"; }}>✕</button>
                    </div>
                    {/* Mini progress bar */}
                    <div style={{ marginTop: 6, height: 3, borderRadius: 2, background: C.border }}>
                      <div style={{ height: "100%", borderRadius: 2, background: `linear-gradient(90deg, ${C.primary}, ${C.accent})`, width: `${(filled / 12) * 100}%`, transition: "width 0.3s" }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Main - Data grid */}
          <div style={{ flex: 1, overflow: "auto" }}>
            {!project ? (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", gap: 16 }}>
                <div style={{ fontSize: 56, opacity: 0.3 }}>📋</div>
                <p style={{ color: C.text3, fontSize: 14 }}>Sélectionnez ou créez un projet pour saisir les données</p>
              </div>
            ) : (
              <div style={{ padding: 4 }}>
                <table style={{ borderCollapse: "separate", borderSpacing: 0, width: "100%", minWidth: 1200 }}>
                  <thead>
                    <tr>
                      <th style={{ ...thStyle, position: "sticky", left: 0, zIndex: 3, background: C.surface, minWidth: 90 }}>Mois</th>
                      {groups.map(g => {
                        const cols = fields.filter(f => f.group === g);
                        return <th key={g} colSpan={cols.length} style={{ ...thStyle, color: cols[0].color, borderBottom: `2px solid ${cols[0].color}30`, textAlign: "center" }}>{g}</th>;
                      })}
                    </tr>
                    <tr>
                      <th style={{ ...thStyle, position: "sticky", left: 0, zIndex: 3, background: C.surface }}></th>
                      {fields.map(f => <th key={f.key} style={{ ...thStyle, color: f.color, fontSize: 9, fontWeight: 600, minWidth: f.key === "commentaire" ? 180 : 80 }}>{f.label}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {MONTHS_FR.map((m, mi) => {
                      const key = `${selYear}-${mi}`;
                      const row = project.data[key] || emptyRow(m, selYear);
                      const hasData = Object.entries(row).some(([k, v]) => k !== "mois" && k !== "annee" && v !== "" && v !== null && v !== undefined);
                      return (
                        <tr key={key} style={{ background: hasData ? C.primaryDim + "15" : mi % 2 ? C.bg + "40" : "transparent" }}>
                          <td style={{ ...tdStyle, position: "sticky", left: 0, zIndex: 1, background: C.surface, fontWeight: 700, color: C.text2, fontSize: 11 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                              {hasData && <span style={{ width: 6, height: 6, borderRadius: "50%", background: C.accent, flexShrink: 0 }} />}
                              {m.slice(0, 4)}
                            </div>
                          </td>
                          {fields.map(f => (
                            <td key={f.key} style={tdStyle}>
                              {f.key === "commentaire" ? (
                                <textarea value={row[f.key] || ""} onChange={e => updateCell(project.id, key, f.key, e.target.value)}
                                  placeholder="..."
                                  style={{ ...cellInputStyle, minHeight: 28, resize: "vertical", fontFamily: font, lineHeight: 1.3 }} />
                              ) : (
                                <input type={f.key === "csat" ? "number" : "text"}
                                  step={f.key === "csat" ? "0.1" : undefined}
                                  value={row[f.key] || ""}
                                  onChange={e => updateCell(project.id, key, f.key, e.target.value)}
                                  placeholder="—"
                                  onFocus={e => { e.target.style.borderColor = f.color; e.target.style.background = C.card2; }}
                                  onBlur={e => { e.target.style.borderColor = "transparent"; e.target.style.background = C.bg; }}
                                  style={cellInputStyle} />
                              )}
                            </td>
                          ))}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>

                {/* Summary bar */}
                <div style={{ display: "flex", gap: 12, padding: "14px 8px", borderTop: `1px solid ${C.border}`, marginTop: 8, flexWrap: "wrap" }}>
                  {[
                    { label: "Σ Eff. Actuel", key: "effectif_actuel", color: C.primary },
                    { label: "Moy. SLA", key: "sla_actuel", color: C.accent, avg: true },
                    { label: "Moy. CSAT", key: "csat", color: C.warn, avg: true },
                    { label: "Σ CA Actuel", key: "ca_actuel", color: "#ec4899" },
                    { label: "Σ CA Prév.", key: "ca_prev", color: "#ec4899" },
                    { label: "Σ PM Actuel", key: "pm_actuel", color: "#8b5cf6" },
                  ].map(s => {
                    const vals = yearKeys.map(k => parseFloat(project.data[k]?.[s.key]) || 0).filter(v => v > 0);
                    const total = vals.reduce((a, b) => a + b, 0);
                    const display = s.avg ? (vals.length ? (total / vals.length).toFixed(1) : "—") : fmt(total);
                    return (
                      <div key={s.key} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 14px", display: "flex", alignItems: "center", gap: 8 }}>

                        <span style={{ color: C.text, fontSize: 13, fontWeight: 800, fontFamily: mono }}>{display}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
